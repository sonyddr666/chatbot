services:
  api:
    build: .
    expose:
      - "8000"
    environment:
      AUTH_SECRET_KEY: ${AUTH_SECRET_KEY:?Defina AUTH_SECRET_KEY no Coolify}
      INITIAL_ADMIN_EMAIL: ${INITIAL_ADMIN_EMAIL:?Defina INITIAL_ADMIN_EMAIL no Coolify}
      INITIAL_ADMIN_USERNAME: ${INITIAL_ADMIN_USERNAME:?Defina INITIAL_ADMIN_USERNAME no Coolify}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD:?Defina INITIAL_ADMIN_PASSWORD no Coolify}
      ALLOW_REGISTRATION: ${ALLOW_REGISTRATION:-false}
      DATABASE_URL: sqlite:////app/data/chatbot.db
      USER_DATA_DIR: /app/data/users
      CHROMA_PERSIST_DIR: /app/data/chroma
      HF_HOME: /app/data/huggingface
      SENTENCE_TRANSFORMERS_HOME: /app/data/sentence-transformers
      LLM_PROVIDER: ${LLM_PROVIDER:-custom_openai}
      CUSTOM_PROFILE: ${CUSTOM_PROFILE:-opencode-zen-free}
      CUSTOM_API_KEY: ${CUSTOM_API_KEY:-}
      CUSTOM_BASE_URL: ${CUSTOM_BASE_URL:-}
      CUSTOM_MODEL: ${CUSTOM_MODEL:-}
      OPENCODE_ZEN_API_KEY: ${OPENCODE_ZEN_API_KEY:-}
      OPENCODE_GO_API_KEY: ${OPENCODE_GO_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      MCP_API_KEY: ${MCP_API_KEY:-}
      INWORLD_API_KEY: ${INWORLD_API_KEY:-}
      INWORLD_TTS_BASE_URL: ${INWORLD_TTS_BASE_URL:-https://api.inworld.ai}
      INWORLD_TTS_MODEL: ${INWORLD_TTS_MODEL:-inworld-tts-2}
      INWORLD_TTS_DEFAULT_VOICE: ${INWORLD_TTS_DEFAULT_VOICE:-}
      INWORLD_TTS_TIMEOUT_SECONDS: ${INWORLD_TTS_TIMEOUT_SECONDS:-20}
      INWORLD_TTS_VOICE_CACHE_SECONDS: ${INWORLD_TTS_VOICE_CACHE_SECONDS:-300}
      INWORLD_TTS_AUDIO_CACHE_SECONDS: ${INWORLD_TTS_AUDIO_CACHE_SECONDS:-300}
      INWORLD_TTS_AUDIO_CACHE_MAX_ITEMS: ${INWORLD_TTS_AUDIO_CACHE_MAX_ITEMS:-256}
      CODEX_SSE_ENABLED: ${CODEX_SSE_ENABLED:-true}
      CODEX_RESPONSE_MODE_DEFAULT: ${CODEX_RESPONSE_MODE_DEFAULT:-normal}
    volumes:
      - chatbot-data:/app/data
    command: uvicorn src.api.app:app --host 0.0.0.0 --port 8000 --workers 1
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:${FRONTEND_HOST_PORT:-3100}:80"
    expose:
      - "80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  chatbot-data:
